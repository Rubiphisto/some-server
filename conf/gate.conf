# gate default configuration
listen.host = 127.0.0.1
listen.port = 9000
log.file = logs/gate.log
log.error_file = logs/gate.error.log
log.level = info
log.console = true
log.syslog = false
log.rotate.mode = size
log.rotate.max_size = 10MB
log.rotate.max_files = 5
log.rotate.daily_hour = 0
log.rotate.daily_minute = 0
runtime.daemon = false
runtime.pid_file = run/gate.pid
