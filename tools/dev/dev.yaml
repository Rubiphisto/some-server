version: "3.8"

services:
  dev:
    build: .
    container_name: dev-debian
    hostname: dev-debian

    ports:
      - "2222:22"

    environment:
      # 改成你自己的密码；若配置了公钥，SSH 会优先用公钥，密码仍可兜底
      DEV_PASSWORD: "somegame"

      # 也可以直接把公钥内容写在这里，或留空并使用下面的文件挂载方式
      # DEV_AUTHORIZED_KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI... your@email"

    volumes:
      # 项目代码
      - ${PWD}/projects:/projects

      # 数据持久化
      - ${PWD}/mariadb_data:/var/lib/mysql
      - ${PWD}/redis_data:/var/lib/redis

      # Codex 用户级配置；默认会读 ~/.codex/config.toml
      - ${PWD}/codex-home:/home/dev/.codex

      # 可选：直接挂一个 authorized_keys 文件，推荐
      #- ./ssh/authorized_keys:/run/dev_authorized_keys/authorized_keys:ro

      # 可选：缓存，加快 npm/pip/Codex 使用体验
      #- npm_cache:/home/dev/.npm
      #- dev_cache:/home/dev/.cache

    restart: unless-stopped
    tty: true
    stdin_open: true

volumes:
  mariadb_data:
  redis_data:
  npm_cache:
  dev_cache: